name: Actualizar catálogo

on:
  schedule:
    # 09:00 UTC = 06:00 Argentina, todos los días
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Descargar precios y regenerar catalogo.js
        run: python update_catalog.py

      - name: Commit y push si hubo cambios
        run: |
          if git diff --quiet catalogo.js; then
            echo "Sin cambios en precios — no se commitea nada."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add catalogo.js
            git commit -m "Actualización automática de precios"
            git push
          fi
